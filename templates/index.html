<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management | @dlv.gonzalezz</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>📊 INVENTORY MANAGEMENT</h1>
            <p id="date-time"></p>
        </header>

        <main>
            <section class="card">
                <h2>Add Product</h2>
                <div class="form-group">
                    <input type="text" id="product-name" placeholder="Product Name">
                    <input type="number" id="product-price" placeholder="Price ($)">
                    <button onclick="addProduct()" class="btn-add">Add</button>
                </div>
            </section>

            <section class="card">
                <h2>Stock Items</h2>
                <table id="inventory-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                    </tbody>
                </table>
                <div id="empty-message" class="hidden">Stock is empty!</div>
            </section>
        </main>

        <footer>
            <p>By @dlv.gonzalezz | 2026</p>
            <p style="font-size: 0.8rem; color: #64748b; margin-top: 5px;">⚠️ For academic and study purposes only. No commercial or political use.</p>
        </footer>
    </div>

    <script src="../static/script.js"></script>
</body>
</html>
